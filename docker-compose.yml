# Production stack deployed on the Tencent Cloud ECS host.
# Images are BUILT on the host by .github/workflows/cd.yml (SSH -> git pull ->
# docker compose build -> up), so there is no container registry round-trip.
# The deploy step provides NEO4J_PASSWORD in the shell env.
#
# build.args point npm/pip at China mirrors so the on-host build is fast; the
# Dockerfiles default to the official registries when these args are absent.
# Inside Tencent Cloud you can swap to the free intranet mirror for max speed:
#   PIP_INDEX_URL: http://mirrors.tencentyun.com/pypi/simple
#   NPM_REGISTRY:  http://mirrors.tencentyun.com/npm/
name: gamegraph

services:
  neo4j:
    image: neo4j:5.20
    restart: unless-stopped
    environment:
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD:?set NEO4J_PASSWORD}"
    volumes:
      - neo4j_data:/data
    ports:
      # Bound to localhost only: the graph DB is not exposed publicly.
      - "127.0.0.1:7474:7474"
      - "127.0.0.1:7687:7687"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend
      args:
        PIP_INDEX_URL: https://mirrors.cloud.tencent.com/pypi/simple
    image: gamegraph-backend:latest
    restart: unless-stopped
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: "${NEO4J_PASSWORD:?set NEO4J_PASSWORD}"
    ports:
      # Host 8100 -> container 8000 (8000 is taken on the ECS). Optional: only for
      # direct API testing. The browser never calls this — the frontend proxies
      # /api/* to backend:8000 over the compose network (see frontend build arg).
      - "8100:8000"

  frontend:
    build:
      context: ./frontend
      args:
        NPM_REGISTRY: https://registry.npmmirror.com
        # Next bakes /api/* -> this target at build time. In-network service name,
        # so the browser talks only to the frontend origin (no CORS, backend private).
        API_PROXY_TARGET: http://backend:8000
    image: gamegraph-frontend:latest
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      # Host 3100 -> container 3000 (avoids the other project already on 3000).
      - "3100:3000"

volumes:
  neo4j_data:
