name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & deploy on ECS
    runs-on: ubuntu-latest
    steps:
      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          known_hosts: 'placeholder-will-replace'

      - name: Add ECS to known_hosts
        run: |
          ssh-keyscan -H -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Build & deploy via SSH
        run: |
          ssh -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'EOF'
            set -e
            cd ~/workspace/GameGraph
            export COMPOSE_FILE=docker-compose.prod.yml
            # Neo4j 密码：仅在数据卷首次初始化时生效，后续改密需手动 cypher-shell 或重置卷
            export NEO4J_PASSWORD='${{ secrets.NEO4J_PASSWORD }}'

            # 重试包装：跨境拉包/拉基础镜像偶发失败时最多尝试 3 次（间隔 10s）
            retry() {
              local n=1 max=3 delay=10
              until "$@"; do
                if [ $n -ge $max ]; then
                  echo "[retry] 仍失败（已尝试 $max 次）: $*" >&2
                  return 1
                fi
                echo "[retry] 第 $n/$max 次失败，${delay}s 后重试: $*"
                n=$((n + 1))
                sleep $delay
              done
            }

            echo "=== Sync repo ==="
            git pull origin main

            # 在 ECS 本机构建镜像，彻底避开 GitHub runner -> TCR 的跨境推送。
            # build 内的 npm ci / pip install 仍需联网，故用 retry 容忍偶发抖动。
            echo "=== Build images on host ==="
            retry docker compose build

            echo "=== Restart stack ==="
            docker compose up -d --remove-orphans

            echo "=== Status ==="
            docker compose ps

            echo "=== Prune dangling images ==="
            docker image prune -f || true
          EOF
